<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="../css/home.css">
    <title>Home</title>
</head>
<body>
    <div class="flex-container">
        <button class="logout-btn">
            <span>ログアウト</span>
        </button>
    </div>
    <div class="button-grid">
        <button class="home-btn" id="regi-btn">
            <img src="../images/regi-icon.png" alt="会計業務">
            <span>会計業務</span>
        </button>
        <button class="home-btn" id="pro-btn">
            <img src="../images/pro-icon.png" alt="商品登録">
            <span>商品登録</span>
        </button>
        <button class="home-btn" id="op-cl-btn">
            <img src="../images/op-cl-icon.png" alt="レジ開け/締め">
            <span>レジ<br>開け／締め</span>
        </button>
        <button class="home-btn" id="data-btn">
            <img src="../images/data-icon.png" alt="データ管理">
            <span>データ管理</span>
        </button>
    </div>
</body>
</html>
