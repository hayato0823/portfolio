<!--JavaScript-->
<script>
flatpickr("#datePicker", {
    locale: "ja",
    dateFormat: "Y/m/d",
    minDate: "2020-01-01",
    position: "below"
});

// コンテナ全体をクリックでカレンダーを開く
document.querySelector(".date-box").addEventListener("click", () => {
    document.querySelector("#datePicker").focus();
});

</script>
